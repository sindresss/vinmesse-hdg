    --sel-neg-bg: #f9d0d0; --sel-neg-bd: #c44040;
    --cbtn-bg: #e8dccf; --cbtn-bd: #cdbfae; --cbtn-tx: #6b5443;
    --in-bg: #fff; --in-bd: #cdbfae; --in-tx: #1a0f08;
    --pill-on-bg: rgba(212,184,150,0.25); --pill-on-bd: #d4b896; --pill-on-tx: #f5efe8;

    --exp-bd: #3da653; --exp-bg: rgba(61,166,83,0.12); --exp-tx: #2e8b4a;
    --sync-dot: #3da653; --sync-tx: #6b5443;

    --bg: #1a1410;
    --hdr-bg: linear-gradient(135deg, #0d0805 0%, #1e140d 60%, #2a1a10 100%);
    --hdr-text: #f0e8dc; --hdr-sub: #c8a878; --hdr-stat: rgba(255,255,255,0.08);

    --in-bg: #2e241c; --in-bd: #4a3c30; --in-tx: #f0e8dc;
    --pill-on-bg: rgba(200,168,120,0.2); --pill-on-bd: #c8a878; --pill-on-tx: #f0e8dc;
    --pill-off-bg: transparent; --pill-off-bd: rgba(200,168,120,0.2); --pill-off-tx: #8a7560;
    --cnt-bg: #2e241c; --cnt-tx: #c8a878; --foot: #6a5a48;
    --exp-bd: #3da653; --exp-bg: rgba(61,166,83,0.1); --exp-tx: #5ec472;
    --sync-dot: #5ec472; --sync-tx: #8a7560;

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); min-height:100vh; min-height:100dvh; -webkit-tap-highlight-color:transparent; }
  .header { background:var(--hdr-bg); padding:20px 16px 16px; text-align:center; position:sticky; top:0; z-index:100; box-shadow:0 4px 24px rgba(0,0,0,0.35); }
  .header-row { display:flex; justify-content:space-between; align-items:flex-start; }
  .header h1 { font-family:'Playfair Display',serif; font-size:22px; font-weight:800; color:var(--hdr-text); letter-spacing:0.02em; }
  .header .sub { font-size:11px; color:var(--hdr-sub); margin-top:3px; letter-spacing:0.15em; text-transform:uppercase; font-weight:600; }
  .sync-badge { display:flex; align-items:center; gap:6px; padding-top:4px; min-width:68px; }
  .sync-dot { width:8px; height:8px; border-radius:50%; background:var(--sync-dot); box-shadow:0 0 6px var(--sync-dot); animation:pulse 2s infinite; }
  .sync-badge[data-state="saving"] .sync-dot { background:var(--sel-neu-bd); box-shadow:0 0 6px var(--sel-neu-bd); }
  .sync-badge[data-state="error"] .sync-dot { background:var(--sel-neg-bd); box-shadow:0 0 6px var(--sel-neg-bd); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .sync-label { font-size:10px; color:var(--sync-tx); font-weight:600; letter-spacing:0.04em; }
  .theme-btn { background:rgba(255,255,255,0.1); border:none; border-radius:8px; font-size:18px; cursor:pointer; padding:4px 8px; }
  .stats { display:flex; justify-content:center; gap:10px; margin-top:12px; flex-wrap:wrap; }
  .stat-box { background:var(--hdr-stat); border-radius:10px; padding:6px 14px; display:flex; align-items:center; gap:6px; }
  .stat-label { font-size:13px; color:var(--hdr-sub); font-weight:500; }
  .stat-num { font-size:18px; font-weight:800; color:var(--hdr-text); }
  .stat-total { font-size:13px; color:var(--hdr-sub); }
  .prod-stat { background:var(--hdr-stat); border-radius:10px; padding:5px 10px; text-align:center; }
  .prod-stat-name { font-size:10px; color:var(--hdr-sub); font-weight:700; text-transform:uppercase; letter-spacing:0.06em; }
  .prod-stat-row { display:flex; gap:6px; margin-top:3px; justify-content:center; font-size:13px; color:var(--hdr-text); }
  .search-wrap { margin:12px auto 0; max-width:420px; position:relative; }
  .search-input { width:100%; padding:11px 40px 11px 14px; border:2px solid var(--search-bd); border-radius:12px; font-family:'DM Sans',sans-serif; font-size:16px; color:var(--search-tx); background:var(--search-bg); outline:none; -webkit-appearance:none; }
  .search-input::placeholder { color:var(--hdr-sub); opacity:0.7; }
  .search-clear { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--hdr-sub); font-size:20px; cursor:pointer; }
  .filters { display:flex; justify-content:center; gap:8px; margin-top:10px; flex-wrap:wrap; }

  .pill.active { border-color:var(--pill-on-bd); background:var(--pill-on-bg); color:var(--pill-on-tx); }
  .pill-export { border-color:var(--exp-bd)!important; background:var(--exp-bg)!important; color:var(--exp-tx)!important; font-weight:700; }
  .list { max-width:860px; margin:0 auto; }
  .list-count { padding:8px 16px; font-size:13px; color:var(--cnt-tx); font-weight:600; border-bottom:1px solid var(--row-line); background:var(--cnt-bg); }

  .store-inner { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

  .prod-label { font-size:10px; font-weight:700; color:var(--prod-lbl); letter-spacing:0.04em; text-transform:uppercase; min-width:48px; }

  .emoji-btn.sel-positive { background:var(--sel-pos-bg); border-color:var(--sel-pos-bd); }
  .emoji-btn.sel-neutral { background:var(--sel-neu-bg); border-color:var(--sel-neu-bd); }
  .emoji-btn.sel-negative { background:var(--sel-neg-bg); border-color:var(--sel-neg-bd); }
  .emoji-btn.dimmed { filter:grayscale(0.85) opacity(0.3); }
  .comment-btn { background:transparent; border:1.5px solid var(--cbtn-bd); border-radius:8px; font-size:15px; cursor:pointer; padding:4px 10px; color:var(--cbtn-tx); font-weight:600; }
  .comment-btn.has-comment { background:var(--cbtn-bg); }
  .comment-input { width:100%; padding:9px 14px; border:1.5px solid var(--in-bd); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--in-tx); background:var(--in-bg); outline:none; margin-top:10px; -webkit-appearance:none; }
  .theme-btn:focus-visible, .pill:focus-visible, .emoji-btn:focus-visible, .comment-btn:focus-visible, .reset-btn:focus-visible, .search-clear:focus-visible, .comment-input:focus-visible, .search-input:focus-visible {
    outline: 2px solid var(--hdr-sub);
    outline-offset: 2px;
  }
  .footer { text-align:center; padding:8px 16px 28px; color:var(--foot); font-size:11px; letter-spacing:0.06em; font-weight:500; }
  .reset-wrap { text-align:center; padding:24px 16px 8px; }
  .reset-btn { background:transparent; border:1px solid var(--row-line); border-radius:8px; padding:6px 16px; color:var(--foot); font-size:12px; cursor:pointer; font-weight:500; font-family:'DM Sans',sans-serif; }
  .empty { padding:48px 16px; text-align:center; color:var(--cnt-tx); font-size:15px; }
  .loading { min-height:100vh; min-height:100dvh; display:flex; align-items:center; justify-content:center; color:var(--name); font-size:16px; }
</style>

City Syd","Trondheim, Heimdal","Trondheim, Lade","Trondheim, Nedre Elvehavn","Trondheim, Sirkus Shopping","Trondheim, Trondheim Torg","Trondheim, Valentinlyst","Trysil","Tvedestrand","Tynset","Tysnes","Tønsberg","Ulefoss","Ulsteinvik","Vadsø","Vanylven","Vardø","Vennesla","Verdal","Vestby","Vestnes","Vik i Hole","Vik i Sogn","Vikersund","Vinje","Vinstra","Vinterbro","Volda","Voss","Vågå","Ytre Enebakk","Åfjord","Ål","Ålesund, Moa","Ålesund, Sentrum","Ålgård","Åndalsnes","Årdal","Årnes","Ås","Åsgårdstrand","Ølen","Ørnes","Ørsta","Øyer"];
const PRODUCTS = ["Week-end","Rasque","Rumor"];
const RX = [{key:"positive",emoji:"😊",label:"Positiv"},{key:"neutral",emoji:"😐",label:"Nøytral"},{key:"negative",emoji:"😞",label:"Negativ"}];

let DATA = {};
let FILTER = "all";
let SEARCH = "";
const THEME_KEY = "vinmesse-theme";
const SAVE_STATE_LABELS = { synced: "DELT", saving: "LAGRER", saved: "LAGRET", error: "FEIL" };
let DARK = false;
let SAVE_STATE = "synced";
let pollTimer = null;
let saveTimer = null;
let syncStateTimer = null;
let localVersion = 0;
let dataGeneration = 0;
const OPEN_COMMENTS = new Set();

function getSystemPrefersDark() {
  return window.matchMedia?.("(prefers-color-scheme:dark)").matches ?? false;
}

function getStoredTheme() {
  try {
    return localStorage.getItem(THEME_KEY);
  } catch {
    return null;
  }
}

function applyTheme(isDark) {
  DARK = isDark;
  document.documentElement.setAttribute("data-theme", DARK ? "dark" : "light");
  document.querySelector('meta[name="theme-color"]').content = DARK ? "#1a1410" : "#2c1810";
}

function setSaveState(state) {
  if (state !== "saved") {
    clearTimeout(syncStateTimer);
  }

  SAVE_STATE = state;

  const syncBadge = document.querySelector(".sync-badge");
  const syncLabel = syncBadge?.querySelector(".sync-label");

  if (!syncBadge || !syncLabel) {
    return;
  }

  syncBadge.dataset.state = state;
  syncLabel.textContent = SAVE_STATE_LABELS[state] || SAVE_STATE_LABELS.synced;
}

function scheduleSyncedState(delay) {
  clearTimeout(syncStateTimer);
  syncStateTimer = setTimeout(() => setSaveState("synced"), delay);
}

function markDataChanged() {
  dataGeneration += 1;
}

function clearSearch() {
  if (!SEARCH) {
    return;
  }

  SEARCH = "";
  render();
}

function startPolling() {
  if (pollTimer) {
    return;
  }

  pollTimer = setInterval(() => {
    if (!document.hidden) {
      loadData();
    }
  }, 5000);
}

function stopPolling() {
  clearInterval(pollTimer);
  pollTimer = null;
}

// --- API ---
async function loadData() {
  try {
    const r = await fetch("/api/data");
    const d = await r.json();
    if (d._v && d._v > localVersion) {
      localVersion = d._v;
      DATA = d;
      render();
      setSaveState("synced");
    } else if (!localVersion) {
      DATA = d;
      render();
      setSaveState("synced");
    }
  } catch(e) {
    console.error("Load failed:", e);
    setSaveState("error");
  }
}

function saveData() {
  clearTimeout(saveTimer);
  setSaveState("saving");
  const generation = dataGeneration;
  saveTimer = setTimeout(async () => {
    const snapshot = Object.assign({}, DATA);

    try {
      const r = await fetch("/api/data", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(snapshot) });
      const d = await r.json();

      if (!r.ok) {
        throw new Error(d?.error || "Failed to save data.");
      }

      if (typeof d._v === "number" && d._v > localVersion) {
        localVersion = d._v;
      }

      if (generation === dataGeneration) {
        DATA = d;
        render();
        setSaveState("saved");
        scheduleSyncedState(1200);
      } else {
        setSaveState("saving");
      }
    } catch(e) {
      console.error("Save failed:", e);
      setSaveState("error");
    }
  }, 300);
}

async function resetAll() {
  if (!confirm("Er du sikker på at du vil slette ALL data? Dette kan ikke angres.")) return;
  try {
    setSaveState("saving");
    const r = await fetch("/api/data", { method:"DELETE" });
    const d = await r.json();

    if (!r.ok) {
      throw new Error(d?.error || "Failed to reset data.");
    }

    DATA = d;
    localVersion = d._v;
    dataGeneration += 1;
    OPEN_COMMENTS.clear();
    render();
    setSaveState("saved");
    scheduleSyncedState(1200);
  } catch(e) {
    console.error("Reset failed:", e);
    setSaveState("error");
  }
}

// --- State helpers ---
function hasAny(store) {
  return PRODUCTS.some(p => DATA[`${store}::${p}`]) || !!DATA[`${store}::comment`];
}

function getFiltered() {
  let list = ALL_STORES;
  if (SEARCH) { const q = SEARCH.toLowerCase(); list = list.filter(s => s.toLowerCase().includes(q)); }
  if (FILTER === "visited") list = list.filter(hasAny);
  if (FILTER === "unvisited") list = list.filter(s => !hasAny(s));
  return list;
}

function getStats() {
  const visited = ALL_STORES.filter(hasAny).length;
  const bp = {};
  PRODUCTS.forEach(p => {
    bp[p] = {positive:0,neutral:0,negative:0};
    ALL_STORES.forEach(s => { const r = DATA[`${s}::${p}`]; if(r) bp[p][r]++; });
  });
  return { visited, total:ALL_STORES.length, bp };
}

// --- Actions ---
function toggleReaction(store, product, reaction) {
  const key = `${store}::${product}`;
  const nextValue = DATA[key] === reaction ? null : reaction;

  if (DATA[key] === nextValue) {
    return;
  }

  DATA[key] = nextValue;
  markDataChanged();
  saveData();
  render();
}

function setComment(store, value) {
  if (DATA[`${store}::comment`] === value) {
    return;
  }

  DATA[`${store}::comment`] = value;
  markDataChanged();
  syncCommentButton(store);
  saveData();
}

function toggleTheme() {
  applyTheme(!DARK);
  try {
    localStorage.setItem(THEME_KEY, DARK ? "dark" : "light");
  } catch {}
  render();
}

function setFilter(f) {
  if (FILTER === f) {
    return;
  }

  FILTER = f;
  render();
}

function setSearch(v) {
  if (SEARCH === v) {
    return;
  }

  SEARCH = v;
  render();
}

function toggleComment(store) {
  if (OPEN_COMMENTS.has(store)) {
    OPEN_COMMENTS.delete(store);
  } else {
    OPEN_COMMENTS.add(store);
  }

  render();
}

function syncCommentButton(store) {
  const sid = store.replace(/[^a-zA-Z0-9]/g,"_");
  const commentButton = document.getElementById(`comment-btn-${sid}`);

  if (!commentButton) {
    return;
  }

  const hasComment = !!(DATA[`${store}::comment`] || "").trim();
  commentButton.classList.toggle("has-comment", hasComment);
  commentButton.textContent = hasComment ? "💬" : "＋💬";
}

function exportCSV() {
  const hdr = ["Butikk",...PRODUCTS.flatMap(p=>[`${p} - Smakt`,`${p} - Reaksjon`]),"Kommentar"];
  const rows = ALL_STORES.filter(hasAny).map(s => {
    const c = [s];
    PRODUCTS.forEach(p => { const r=DATA[`${s}::${p}`]; c.push(r?"Ja":"Nei"); c.push(r?RX.find(x=>x.key===r)?.label||"":""); });
    c.push((DATA[`${s}::comment`]||"").replace(/"/g,'""'));
    return c.map(v=>`"${v}"`).join(";");
  });
  const csv = "\uFEFF" + [hdr.map(h=>`"${h}"`).join(";"),...rows].join("\n");
  const blob = new Blob([csv],{type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url;
  a.download=`vinmesse-hdg-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

function captureRenderState() {
  const activeElement = document.activeElement;

  if (activeElement?.classList?.contains("search-input")) {
    return {
      type: "search",
      selectionStart: activeElement.selectionStart ?? SEARCH.length,
      selectionEnd: activeElement.selectionEnd ?? SEARCH.length
    };
  }

  if (activeElement?.classList?.contains("comment-input")) {
    return {
      type: "comment",
      store: activeElement.dataset.store ?? "",
      selectionStart: activeElement.selectionStart ?? activeElement.value.length,
      selectionEnd: activeElement.selectionEnd ?? activeElement.value.length
    };
  }

  return null;
}

function restoreRenderState(renderState) {
  if (!renderState) {
    return;
  }

  if (renderState.type === "search") {
    const searchInput = document.querySelector(".search-input");

    if (!searchInput) {
      return;
    }

    searchInput.focus();

    const selectionStart = Math.min(renderState.selectionStart, searchInput.value.length);
    const selectionEnd = Math.min(renderState.selectionEnd, searchInput.value.length);

    searchInput.setSelectionRange(selectionStart, selectionEnd);
    return;
  }

  if (renderState.type === "comment") {
    const commentInput = document.querySelector(`.comment-input[data-store="${renderState.store}"]`);

    if (!commentInput) {
      return;
    }

    const selectionStart = Math.min(renderState.selectionStart, commentInput.value.length);
    const selectionEnd = Math.min(renderState.selectionEnd, commentInput.value.length);

    requestAnimationFrame(() => {
      commentInput.focus();
      commentInput.setSelectionRange(selectionStart, selectionEnd);
    });
  }
}

// --- Render ---
function render() {
  const stats = getStats();
  const filtered = getFiltered();
  const app = document.getElementById("app");
  const renderState = captureRenderState();
  app.className = "";

  app.innerHTML = `
    <div class="header">
      <div class="header-row">
        <div style="flex:1"><div class="sync-badge" data-state="${SAVE_STATE}" role="status" aria-live="polite"><span class="sync-dot"></span><span class="sync-label">${SAVE_STATE_LABELS[SAVE_STATE] || SAVE_STATE_LABELS.synced}</span></div></div>
        <div>
          <h1>HAUT DE GAMME</h1>
          <div class="sub">Vinmesse — Polregistrering</div>
        </div>
        <div style="flex:1;display:flex;justify-content:flex-end">
          <button type="button" class="theme-btn" aria-label="${DARK ? "Bytt til lyst tema" : "Bytt til mørkt tema"}" onclick="toggleTheme()">${DARK?"☀️":"🌙"}</button>
        </div>
      </div>
      <div class="stats">
        <div class="stat-box">
          <span class="stat-label">Besøkt</span>
          <span class="stat-num">${stats.visited}</span>
          <span class="stat-total">/ ${stats.total}</span>
        </div>
        ${PRODUCTS.map(p=>`
          <div class="prod-stat">
            <div class="prod-stat-name">${p}</div>
            <div class="prod-stat-row">
              <span>😊 ${stats.bp[p].positive}</span>
              <span>😐 ${stats.bp[p].neutral}</span>
              <span>😞 ${stats.bp[p].negative}</span>
            </div>
          </div>
        `).join("")}
      </div>
      <div class="search-wrap">
        <input class="search-input" type="text" placeholder="Søk etter butikk..." value="${SEARCH}" autocomplete="off" autocapitalize="off" spellcheck="false" enterkeyhint="search" aria-label="Søk etter butikk" oninput="setSearch(this.value)" onkeydown="if(event.key==='Escape'){ clearSearch(); }">
        ${SEARCH?`<button type="button" class="search-clear" aria-label="Tøm søk" onclick="clearSearch()">✕</button>`:""}
      </div>
      <div class="filters">
        ${[{k:"all",l:"Alle"},{k:"visited",l:"Besøkt"},{k:"unvisited",l:"Ikke besøkt"}].map(f=>
          `<button type="button" class="pill ${FILTER===f.k?"active":""}" aria-pressed="${FILTER===f.k}" onclick="setFilter('${f.k}')">${f.l}</button>`
        ).join("")}
        <button type="button" class="pill pill-export" onclick="exportCSV()">⬇ CSV</button>
      </div>
    </div>
    <div class="list">
      <div class="list-count">${filtered.length} av ${ALL_STORES.length} butikker</div>
      ${filtered.length === 0 ? `<div class="empty">Ingen butikker funnet for «${SEARCH}»</div>` :
        filtered.map(store => renderStore(store)).join("")}
    </div>
    <div class="reset-wrap"><button type="button" class="reset-btn" onclick="resetAll()">Nullstill all data</button></div>
    <div class="footer">Haut De Gamme AS — Provençal Rosé</div>
  `;

  restoreRenderState(renderState);
}

function renderStore(store) {
  const comment = DATA[`${store}::comment`] || "";
  const hasComment = !!comment.trim();
  const sid = store.replace(/[^a-zA-Z0-9]/g,"_");
  return `
    <div class="store-row">
      <div class="store-inner">
        <span class="store-name">${store}</span>
        <div class="products">
          ${PRODUCTS.map(product => {
            const cur = DATA[`${store}::${product}`] || null;
            return `<div class="prod-box">
              <span class="prod-label">${product}</span>
              ${RX.map(r => {
                const sel = cur === r.key;
                const cls = sel ? `sel-${r.key}` : (cur ? "dimmed" : "");
                return `<button type="button" class="emoji-btn ${cls}" title="${r.label}" aria-label="${store}: ${product} ${r.label}" aria-pressed="${sel}" onclick="toggleReaction('${store.replace(/'/g,"\\'")}','${product}','${r.key}')">${r.emoji}</button>`;
              }).join("")}
            </div>`;
          }).join("")}
        </div>
        <button type="button" id="comment-btn-${sid}" class="comment-btn ${hasComment?"has-comment":""}" aria-expanded="${OPEN_COMMENTS.has(store)}" aria-controls="cmt-${sid}" onclick="toggleComment('${store.replace(/'/g,"\\'")}')">${hasComment?"💬":"＋💬"}</button>
      </div>
      <div id="cmt-${sid}" style="display:${OPEN_COMMENTS.has(store) ? "block" : "none"}">
        <input class="comment-input" data-store="${sid}" type="text" value="${comment.replace(/"/g,"&quot;")}" placeholder="Skriv kommentar..." aria-label="Kommentar for ${store}" oninput="setComment('${store.replace(/'/g,"\\'")}',this.value)" onkeydown="if(event.key==='Escape'){ toggleComment('${store.replace(/'/g,"\\'")}'); }">
      </div>
    </div>
  `;
}

// --- Init ---
(async function init() {
  const storedTheme = getStoredTheme();
  applyTheme(storedTheme ? storedTheme === "dark" : getSystemPrefersDark());
  await loadData();
  render();
  startPolling();
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      stopPolling();
      return;
    }

    loadData();
    startPolling();
  });
  window.matchMedia("(prefers-color-scheme:dark)").addEventListener("change", e => {
    if (getStoredTheme()) {
      return;
    }

    applyTheme(e.matches);
    render();
  });
})();
</script>
</body>
</html>
